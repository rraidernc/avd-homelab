---
# Common AVD group variables
fabric_name: FABRIC

# Management interface and VRF
mgmt_interface: Management1
mgmt_interface_vrf: MGMT

# Generate CSVs with fabric link info.
eos_designs_documentation:
  topology_csv: true
  p2p_links_csv: true

# Define underlay and overlay routing protocol to be used
underlay_routing_protocol: ebgp
overlay_routing_protocol: ebgp

# Local users
aaa_settings:
  local_users:
    - name: admin
      privilege: 15
      role: network-admin
      no_password: true
    - name: cvpadmin
      privilege: 15
      role: network-admin
      sha512_password: "$6$godNzffxtiMxcMOR$HNbUcjgSNlGXXENH47HNRwHwOHePBoqfhfxsWDeT8bHZ4rKdbeJwLrDAnIhQ1SG7MifORz01MW9W1pZEm/AB81"

# BGP peer groups passwords
bgp_peer_groups:
  evpn_overlay_peers:
    password: Q4fqtbqcZ7oQuKfuWtNGRQ==
  ipv4_underlay_peers:
    password: 7x4B4rnJhZB438m9+BrBfQ==
  mlag_ipv4_underlay_peer:
    password: 4b21pAdCvWeAqpcKDFMdWw==

# P2P interfaces MTU - set to 1500 for vEOS-lab in EVE-NG
p2p_uplinks_mtu: 1500

# Set default uplink, downlink, and MLAG interfaces based on node type
default_interfaces:
  - types: [spine]
    platforms: [default]
    uplink_interfaces: [Ethernet1-2]
    downlink_interfaces: [Ethernet1-8]
  - types: [l3leaf]
    platforms: [default]
    uplink_interfaces: [Ethernet1-2]
    mlag_interfaces: [Ethernet3-4]
    downlink_interfaces: [Ethernet8]
  - types: [l2leaf]
    platforms: [default]
    uplink_interfaces: [Ethernet1-2]

# DCI - L3 Edge links between DC1 border leafs and DC2 border leafs
l3_edge:
  p2p_links_ip_pools:
    - name: DCI_IP_pool
      ipv4_pool: 172.100.100.0/24
  p2p_links_profiles:
    - name: DCI_profile
      ip_pool: DCI_IP_pool
      as: [65102, 65202]
      include_in_underlay_protocol: true
  p2p_links:
    - nodes: [dc1-leaf2a, dc2-leaf2a]
      profile: DCI_profile
      interfaces: [Ethernet6, Ethernet6]
      ip: [172.100.100.0/31, 172.100.100.1/31]
    - nodes: [dc1-leaf2b, dc2-leaf2b]
      profile: DCI_profile
      interfaces: [Ethernet6, Ethernet6]
      ip: [172.100.100.2/31, 172.100.100.3/31]

# CloudVision Portal definitions
cv_settings:
  onprem_clusters:
    - name: primary
      servers:
        - name: 192.168.4.165
  terminattr:
    disable_aaa: true

# DNS Server
dns_settings:
  servers:
    - ip_address: 8.8.8.8

# NTP
ntp_settings:
  server_vrf: use_mgmt_interface_vrf
  servers:
    - name: 192.168.4.250
