---
tenants:
  # Definition of tenants. Additional level of abstraction to VRFs
  - name: TENANT1
    # Number used to generate the VNI of each VLAN by adding the VLAN number in this tenant.
    mac_vrf_vni_base: 10000
    vrfs:
      # VRF definitions inside the tenant.
      - name: VRF10
        # VRF VNI definition.
        vrf_vni: 10
        # Enable VTEP Network diagnostics
        vtep_diagnostic:
          loopback: 10
          loopback_ip_range: 10.255.10.0/27
        svis:
          - id: 11
            name: VRF10_VLAN11
            enabled: true
            ip_address_virtual: 10.10.11.1/24
          - id: 12
            name: VRF10_VLAN12
            enabled: true
            ip_address_virtual: 10.10.12.1/24
          # Firewall transit VLAN for VRF10
          - id: 3901
            name: VRF10_FW_TRANSIT
            enabled: true
            nodes:
              - node: dc1-border-leaf1a
                ip_address: 10.255.251.1/29
              - node: dc1-border-leaf1b
                ip_address: 10.255.251.1/29
            bgp:
              structured_config:
                neighbors:
                  - ip_address: 10.255.251.2
                    remote_as: "65500"
                    description: mills-avd-fw_VRF10
                    send_community: all
                    maximum_routes: 0
      - name: VRF11
        vrf_vni: 11
        vtep_diagnostic:
          loopback: 11
          loopback_ip_range: 10.255.11.0/27
        svis:
          - id: 21
            name: VRF11_VLAN21
            enabled: true
            ip_address_virtual: 10.10.21.1/24
          - id: 22
            name: VRF11_VLAN22
            enabled: true
            ip_address_virtual: 10.10.22.1/24
          # Firewall transit VLAN for VRF11
          - id: 3902
            name: VRF11_FW_TRANSIT
            enabled: true
            nodes:
              - node: dc1-border-leaf1a
                ip_address: 10.255.252.1/29
              - node: dc1-border-leaf1b
                ip_address: 10.255.252.1/29
            bgp:
              structured_config:
                neighbors:
                  - ip_address: 10.255.252.2
                    remote_as: "65500"
                    description: mills-avd-fw_VRF11
                    send_community: all
                    maximum_routes: 0
    l2vlans:
      - id: 3401
        name: L2_VLAN3401
      - id: 3402
        name: L2_VLAN3402
