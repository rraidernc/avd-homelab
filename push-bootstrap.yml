---
# One-time playbook to push bootstrap configurations to all switches
# Uses current admin credentials before cvpadmin is configured
# Run with: ansible-playbook push-bootstrap.yml
 
- name: Push bootstrap configurations to all switches
  hosts: FABRIC
  gather_facts: false
  connection: ansible.netcommon.httpapi
 
  vars:
    ansible_network_os: arista.eos.eos
    ansible_user: admin
    ansible_password: cetest.123
    ansible_become: true
    ansible_become_method: enable
    ansible_httpapi_use_ssl: true
    ansible_httpapi_validate_certs: false
 
  tasks:
    - name: Push bootstrap configuration
      arista.eos.eos_config:
        src: "{{ playbook_dir }}/switch-basic-configurations/{{ inventory_hostname }}-basic-configuration.txt"
        replace: config
 
    - name: Save configuration to flash
      arista.eos.eos_command:
        commands:
          - write memory
 
    - name: Confirm hostname
      arista.eos.eos_command:
        commands:
          - show hostname
      register: hostname_output
 
    - name: Display hostname
      debug:
        msg: "{{ inventory_hostname }} - {{ hostname_output.stdout[0] }}"
 