---
# AVD Fabric Validation Playbook
# Runs ANTA tests against all fabric devices to verify state
# Run with: ansible-playbook validate.yml

- name: Validate Network State
  hosts: FABRIC
  gather_facts: false
  connection: ansible.netcommon.httpapi

  vars:
    ansible_network_os: arista.eos.eos
    ansible_user: cvpadmin
    ansible_password: cetest.123
    ansible_become: true
    ansible_become_method: enable
    ansible_httpapi_use_ssl: true
    ansible_httpapi_validate_certs: false

  tasks:

    - name: Generate ANTA catalog and validate network state
      ansible.builtin.import_role:
        name: arista.avd.anta_runner
