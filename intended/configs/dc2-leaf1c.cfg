!
no enable password
no aaa root
!
username admin privilege 15 role network-admin nopassword
username cvpadmin privilege 15 role network-admin secret sha512 $6$godNzffxtiMxcMOR$HNbUcjgSNlGXXENH47HNRwHwOHePBoqfhfxsWDeT8bHZ4rKdbeJwLrDAnIhQ1SG7MifORz01MW9W1pZEm/AB81
!
daemon TerminAttr
   exec /usr/bin/TerminAttr -cvaddr=192.168.4.165:9910 -cvauth=token,/tmp/token -cvvrf=MGMT -disableaaa -smashexcludes=ale,flexCounter,hardware,kni,pulse,strata -taillogs -cvsourceintf=Management1
   no shutdown
!
vlan internal order ascending range 1006 1199
!
transceiver qsfp default-mode 4x10G
!
service routing protocols model multi-agent
!
hostname dc2-leaf1c
!
spanning-tree mode mstp
spanning-tree mst 0 priority 32768
!
vlan 11
   name VRF10_VLAN11
!
vlan 12
   name VRF10_VLAN12
!
vlan 21
   name VRF11_VLAN21
!
vlan 22
   name VRF11_VLAN22
!
vlan 3401
   name L2_VLAN3401
!
vlan 3402
   name L2_VLAN3402
!
vlan 3901
   name VRF10_FW_TRANSIT
!
vlan 3902
   name VRF11_FW_TRANSIT
!
vrf instance MGMT
!
management api http-commands
   protocol https
   no shutdown
   !
   vrf MGMT
      no shutdown
!
interface Port-Channel1
   description L2_DC2_L3_LEAF1_Port-Channel8
   no shutdown
   switchport trunk allowed vlan 11-12,21-22,3401-3402,3901-3902
   switchport mode trunk
   switchport
!
interface Ethernet1
   description L2_dc2-leaf1a_Ethernet8
   no shutdown
   channel-group 1 mode active
!
interface Ethernet2
   description L2_dc2-leaf1b_Ethernet8
   no shutdown
   channel-group 1 mode active
!
interface Ethernet5
   description SERVER_dc2-leaf1-server1_iLO
   no shutdown
   switchport access vlan 11
   switchport mode access
   switchport
   spanning-tree portfast
!
interface Management1
   description OOB_MANAGEMENT
   no shutdown
   vrf MGMT
   ip address 192.168.4.134/22
no ip routing vrf MGMT
!
ip route vrf MGMT 0.0.0.0/0 192.168.4.1
!
ntp local-interface vrf MGMT Management1
ntp server vrf MGMT 192.168.4.250 prefer
!
end
